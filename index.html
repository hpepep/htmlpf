<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMFI NAV Lookup</title>

<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background:#f4f6f9;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .container{
        background:white;
        padding:30px;
        width:420px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,.2);
    }

    h2{
        margin-top:0;
        text-align:center;
    }

    input{
        width:100%;
        padding:10px;
        font-size:16px;
        box-sizing:border-box;
    }

    button{
        margin-top:15px;
        width:100%;
        padding:10px;
        font-size:16px;
        cursor:pointer;
        background:#0078d4;
        color:white;
        border:none;
        border-radius:5px;
    }

    button:hover{
        background:#005fa3;
    }

    #result{
        margin-top:25px;
        background:#eef5ff;
        padding:15px;
        border-radius:5px;
        display:none;
    }

    .label{
        font-weight:bold;
    }

    .error{
        color:red;
    }
</style>
</head>

<body>

<div class="container">

<h2>Mutual Fund NAV Lookup</h2>

<input
    type="text"
    id="amfi"
    placeholder="Enter AMFI Code">

<button onclick="getNAV()">OK</button>

<div id="result"></div>

</div>

<script>

async function getNAV(){

    const code = document.getElementById("amfi").value.trim();
    const result = document.getElementById("result");

    result.style.display="block";
    result.innerHTML="Fetching...";

    if(code===""){
        result.innerHTML="<span class='error'>Please enter an AMFI code.</span>";
        return;
    }

    try{

        const response = await fetch(`https://api.mfapi.in/mf/${code}`);

        if(!response.ok){
            throw new Error("Invalid AMFI Code");
        }

        const data = await response.json();

        if(!data.data || data.data.length===0){
            throw new Error("No NAV data found");
        }

        const latest = data.data[0];

        result.innerHTML=`
            <p><span class="label">Scheme:</span><br>${data.meta.scheme_name}</p>

            <p><span class="label">Latest NAV:</span>
            ${latest.nav}</p>

            <p><span class="label">Date:</span>
            ${latest.date}</p>
        `;

    }
    catch(err){
        result.innerHTML=`<span class="error">${err.message}</span>`;
    }

}

</script>

</body>
</html>
